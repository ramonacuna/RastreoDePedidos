<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Aplicación web para el rastreo de envíos y paquetes.">
    <title>Sistema de Rastreo de Envíos</title>
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    
    <!-- Custom CSS -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/styles.css') }}">
</head>
<body>
    <div class="background-blobs">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
    </div>

    <main class="container">
        <header class="app-header">
            <div class="logo-icon">📦</div>
            <h1>Rastreo de Envíos</h1>
            <p>Ingresa el número de guía para conocer la ubicación de tu paquete</p>
        </header>

        <section class="search-section">
            <form id="tracking-form" class="search-form">
                <div class="input-group">
                    <input type="text" id="tracking-input" placeholder="Ej: TRK12345" required autocomplete="off">
                    <button type="submit" id="search-btn">
                        <span>Buscar</span>
                        <svg class="search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <circle cx="11" cy="11" r="8"></circle>
                            <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
                        </svg>
                    </button>
                </div>
            </form>
            <div id="loading-spinner" class="spinner hidden"></div>
            <div id="error-message" class="error hidden"></div>
        </section>

        <section id="results-section" class="results-section hidden">
            <div class="package-header">
                <h2>Estado del Paquete: <span id="pkg-id"></span></h2>
                <div class="status-badge" id="pkg-status"></div>
            </div>

            <div class="route-info">
                <div class="route-point origin">
                    <span class="label">Origen</span>
                    <strong id="pkg-origin"></strong>
                </div>
                <div class="route-line">
                    <div class="route-progress" id="pkg-progress"></div>
                    <div class="truck-icon">🚚</div>
                </div>
                <div class="route-point destination">
                    <span class="label">Destino</span>
                    <strong id="pkg-destination"></strong>
                </div>
            </div>

            <div class="delivery-estimate">
                <span class="label">Fecha Estimada de Entrega:</span>
                <strong id="pkg-estimate"></strong>
            </div>

            <div class="history-section">
                <h3>Historial de Movimientos</h3>
                <ul class="timeline" id="pkg-events">
                    <!-- Events will be populated dynamically -->
                </ul>
            </div>
        </section>
    </main>

    <!-- Custom JS -->
    <script src="{{ url_for('static', filename='js/main.js') }}"></script>
</body>
</html>
